spring:
  application:
    name: sb01-otboo-team05
  profiles:
    active: default
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:/home/ubuntu/app/images/

# 로깅 레벨 설정
logging:
  level:
    root: info
    org.hibernate.SQL: debug

# 액츄에이터
management:
  endpoints:
    web:
      exposure:
        include: info, health, metrics, loggers
  info:
    env:
      enabled: true
# 기상청 API 설정
weather:
  api:
    serviceKey: ${WEATHER_API_KEY}
    url: ${WEATHER_API_URL}

#카카오 지역명 추출 API
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}

# JWT 설정 추가
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000
