spring:
  application:
    name: sb01-otboo-team05
  profiles:
    active: default
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create #update
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Seoul
  # 스프링 배치 설정
  batch:
    jdbc:
      initialize-schema: never
    job:
      enabled: false

  cloud:
    aws:
      credentials:
        access-key: ${AWS_ACCESS_KEY}
        secret-key: ${AWS_SECRET_KEY}
      region:
        static: ap-northeast-2
      s3:
        bucket: team5-discodeit
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: "${GOOGLE_CLIENT_ID}"
            client-secret: "${GOOGLE_CLIENT_SECRET}"
            scope:
              - openid
              - profile
              - email
            redirect-uri: "http://localhost:8080/login/oauth2/code/google"
            authorization-grant-type: authorization_code
            client-name: Google
          kakao:
            client-id: "${KAKAO_REST_API_KEY}" # 같은 키 값을 사용해서
            scope:
              - profile_nickname
              - profile_image
            redirect-uri: "http://localhost:8080/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-name: Kakao
            client-authentication-method: client_secret_post
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  file:
    upload-dir: uploads

  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:/home/ubuntu/app/images/

# 로깅 레벨 설정
logging:
  level:
    root: info
    org.hibernate.SQL: debug

# 액츄에이터
management:
  endpoints:
    web:
      exposure:
        include: info, health, metrics, loggers, prometheus
  info:
    env:
      enabled: true
  metrics:
    enable:
      all: true

# 기상청 API 설정
weather:
  api:
    serviceKey: ${WEATHER_API_KEY}
    url: ${WEATHER_API_URL}

#카카오 지역명 추출 API
kakao:
  rest-api-key: ${KAKAO_REST_API_KEY}

# JWT 설정 추가
jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 1800000
  refresh-token-expiration: 604800000

# 어드민 계정 설정
admin:
  email: ${ADMIN_EMAIL}
  password: ${ADMIN_PASSWORD}
  name: ${ADMIN_NAME}

app:
  oauth2:
    redirect:
      success-url: "${OAUTH2_SUCCESS_URL:http://localhost:8080/}"
      failure-url: "${OAUTH2_FAILURE_URL:http://localhost:8080/sign-in}"
