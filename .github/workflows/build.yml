name: Build and Deploy

on:
  push:
    branches:
      - 'feat/ci_68_test'  # 테스트 브랜치에서만 실행

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      sha_short: ${{ steps.meta.outputs.sha_short }}
      build_date: ${{ steps.meta.outputs.build_date }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build .jar file with Gradle
        run: ./gradlew build -x test

      - name: Extract build metadata
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Prepare Docker context
        run: |
          mkdir docker-context
          JAR_PATH=$(ls -1 build/libs/*.jar | head -n 1)
          cp "$JAR_PATH" docker-context/app.jar
          cp Dockerfile docker-context/
          ls -al docker-context/

      - name: Upload docker context artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-context
          path: docker-context

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download docker context artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-context
          path: docker-context

      - name: List root directory after download
        run: ls -al

      - name: List docker-context directory (if exists)
        run: ls -al docker-context || echo "docker-context 폴더 없음"

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          IMAGE_TAG=sha-${{ needs.build.outputs.sha_short }}
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.AWS_URL }}

      - name: Check files in current directory before docker build
        run: |
          echo "현재 작업 디렉토리: $(pwd)"
          ls -al

      - name: Build Docker image
        run: |
          docker build -t ootd_image:latest docker-context
          docker tag ootd_image:latest ${{ secrets.AWS_URL }}/team5/ootd/ootd_image:latest
          docker tag ootd_image:latest ${{ secrets.AWS_URL }}/team5/ootd/ootd_image:sha-${{ needs.build.outputs.sha_short }}

      - name: Push Docker image to ECR
        run: |
          docker push ${{ secrets.AWS_URL }}/team5/ootd/ootd_image:latest
          docker push ${{ secrets.AWS_URL }}/team5/ootd/ootd_image:sha-${{ needs.build.outputs.sha_short }}
