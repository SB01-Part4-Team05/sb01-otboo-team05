name: Build, Push, and Deploy

on:
  push:
    branches:
      - 'feat/ci_68_test'  # 테스트 브랜치

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build .jar file with Gradle
        run: ./gradlew bootJar -x test

      - name: Extract build metadata
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Prepare Docker context
        run: |
          mkdir docker-context
          JAR_PATH=$(ls -1 build/libs/*.jar | head -n 1)
          cp "$JAR_PATH" docker-context/app.jar
          cp Dockerfile docker-context/
          ls -al docker-context/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}

      - name: Login to ECR
        run: aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.AWS_URL }}

      - name: Build Docker image
        run: |
          docker build -t ootd_image:latest docker-context
          docker tag ootd_image:latest ${{ secrets.AWS_URL }}:latest
          docker tag ootd_image:latest ${{ secrets.AWS_URL }}:sha-${{ steps.meta.outputs.sha_short }}

      - name: Push Docker image to ECR
        run: |
          docker push ${{ secrets.AWS_URL }}:latest
          docker push ${{ secrets.AWS_URL }}:sha-${{ steps.meta.outputs.sha_short }}

      - name: Render ECS Task Definition
        id: render-task
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ootd_task.json
          container-name: ootd-app
          image: ${{ secrets.AWS_URL }}:sha-${{ steps.meta.outputs.sha_short }}
          environment-variables: |
            SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/ootd
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USER }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
            WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}
            WEATHER_API_URL=${{ secrets.WEATHER_API_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_NAME=${{ secrets.ADMIN_NAME }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          service: ootd_task-service-kqe6w5p5
          cluster: ootd_service
          task-definition: ${{ steps.render-task.outputs.task-definition }}
          wait-for-service-stability: true
