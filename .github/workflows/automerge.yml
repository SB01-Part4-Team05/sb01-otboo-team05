name: AutoMerge with Dev Sync & 2+ Approvals

on:
  workflow_run:
    workflows: ["Run test"]  # ✅ 테스트 워크플로우 이름 정확히 기입
    types:
      - completed

env:
  OOTD_TOKEN: ${{ secrets.OOTD_ACCESS_TOKEN }}

permissions:
  pull-requests: write
  contents: write
  actions: write
  statuses: write

jobs:
  automerge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get PR info by branch
        id: get_pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          script: |
            const headBranch = context.payload.workflow_run.head_branch;
            const { owner, repo } = context.repo;
            const pulls = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${headBranch}`,
            });

            if (pulls.data.length === 0) {
              core.setFailed(`No open PR found for branch '${headBranch}'`);
              return;
            }

            const pr = pulls.data[0];
            core.setOutput("pr_number", pr.number);
            core.setOutput("branch", headBranch);

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_pr.outputs.branch }}
          token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and merge dev branch
        id: merge_dev
        run: |
          git fetch origin dev
          set +e
          git merge origin/dev --no-edit
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "Merge conflict detected"
            echo "conflict=true" >> $GITHUB_OUTPUT
          else
            echo "Merged with dev successfully"
            echo "conflict=false" >> $GITHUB_OUTPUT
            git push origin HEAD
          fi

      - name: Abort on merge conflict
        if: steps.merge_dev.outputs.conflict == 'true'
        run: |
          echo "Merge conflict occurred while merging dev. Aborting automerge."
          exit 1

      - name: Check approved reviews count
        id: check_approvals
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          script: |
            const pr_number = Number("${{ steps.get_pr.outputs.pr_number }}");
            const { owner, repo } = context.repo;
            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number: pr_number });

            const latest = new Map();
            for (const review of reviews.data) {
              latest.set(review.user.login, review.state);
            }

            const approvedCount = [...latest.values()].filter(state => state === 'APPROVED').length;
            core.setOutput('approved_count', approvedCount);

      - name: Enable AutoMerge
        if: steps.check_approvals.outputs.approved_count >= 2
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          pull-request-number: ${{ steps.get_pr.outputs.pr_number }}
