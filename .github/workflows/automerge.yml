name: AutoMerge with 2+ Approvals

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - edited
  pull_request_review:
    types: [ submitted ]
  pull_request:
    types: [ synchronize ]

env:
  OOTD_TOKEN: ${{ secrets.OOTD_ACCESS_TOKEN }}

permissions:
  pull-requests: write
  contents: write
  actions: write
  statuses: write

jobs:
  automerge:
    if: |
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest

    steps:
      - name: Get PR info
        id: pr_info
        run: |
          echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          echo "branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr_info.outputs.branch }}
          token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch and merge dev branch
        id: merge_dev
        run: |
          git fetch origin dev
          set +e
          git merge origin/dev --no-edit
          status=$?
          set -e
          if [ $status -ne 0 ]; then
            echo "Merge conflict detected"
            echo "conflict=true" >> $GITHUB_OUTPUT
          else
            echo "Merged with dev successfully"
            echo "conflict=false" >> $GITHUB_OUTPUT
            git push origin HEAD
          fi

      - name: Abort on merge conflict
        if: steps.merge_dev.outputs.conflict == 'true'
        run: |
          echo "Merge conflict occurred while merging dev. Aborting automerge."
          exit 1

      - name: Check approved reviews count
        id: check_approvals
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          script: |
            const pr_number = Number("${{ steps.pr_info.outputs.pr_number }}");
            const { owner, repo } = context.repo;
            const reviews = await github.rest.pulls.listReviews({ owner, repo, pull_number: pr_number });

            const latest = new Map();
            for (const review of reviews.data) {
              latest.set(review.user.login, review.state);
            }

            const approvedCount = [...latest.values()].filter(state => state === 'APPROVED').length;
            core.setOutput('approved_count', approvedCount);

      - name: Enable AutoMerge
        if: ${{ fromJson(steps.check_approvals.outputs.approved_count) >= 2 }}
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.OOTD_ACCESS_TOKEN }}
          pull-request-number: ${{ steps.pr_info.outputs.pr_number }}
