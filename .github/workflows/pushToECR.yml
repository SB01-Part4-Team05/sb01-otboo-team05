name: CD - Push Docker Image to ECR

on:
  push:
    branches: [ develop ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          echo "image_tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}

      - name: Login to ECR
        run: aws ecr get-login-password | podman login --username AWS --password-stdin ${{ secrets.AWS_URL }}

      - name: Push Docker image
        uses: redhat-actions/push-to-registry@v2.8
        with:
          image: ootdImage
          tags: |
            latest
            sha-${{ github.sha }}
          registry: ${{ secrets.AWS_URL }}
