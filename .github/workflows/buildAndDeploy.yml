name: Build and Deploy

on:
  pull_request:
    branches: [main, develop]
    types: [closed]
  push:
    branches: [main, develop]


permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build .jar file with Gradle
        run: ./gradlew bootJar -x test

      - name: Extract build metadata
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

      - name: Prepare Java Docker context
        run: |
          mkdir -p docker-context/ootd-app
          JAR_PATH=$(ls -1 build/libs/*.jar | head -n 1)
          cp "$JAR_PATH" docker-context/ootd-app/app.jar
          cp Dockerfile docker-context/ootd-app/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ap-northeast-2
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ secrets.AWS_ROLE_NAME }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password | docker login --username AWS --password-stdin ${{ secrets.AWS_URL }}

      - name: Build Java Docker image
        run: |
          docker build -t ootd_image:latest docker-context/ootd-app
          docker tag ootd_image:latest ${{ secrets.AWS_URL }}:ootd-latest
          docker tag ootd_image:latest ${{ secrets.AWS_URL }}:ootd-sha-${{ steps.meta.outputs.sha_short }}

      - name: Push Java Docker image to ECR
        run: |
          docker push ${{ secrets.AWS_URL }}:ootd-latest
          docker push ${{ secrets.AWS_URL }}:ootd-sha-${{ steps.meta.outputs.sha_short }}

      - name: Render ECS Task Definition for ootd-app
        id: render-ootd
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ootd_task.json
          container-name: ootd-app
          image: ${{ secrets.AWS_URL }}:ootd-sha-${{ steps.meta.outputs.sha_short }}
          environment-variables: |
            SPRING_DATASOURCE_URL=${{ secrets.RDS_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.RDS_USER }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.RDS_PASS }}
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
            WEATHER_API_KEY=${{ secrets.WEATHER_API_KEY }}
            WEATHER_API_URL=${{ secrets.WEATHER_API_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            ADMIN_NAME=${{ secrets.ADMIN_NAME }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}
            AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}
            ACTUATOR_USER=${{ secrets.ACTUATOR_USER }}
            ACTUATOR_PASSWORD=${{ secrets.ACTUATOR_PASSWORD }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          service: ootd_task-service-kqe6w5p5
          cluster: ootd_server
          task-definition: ${{ steps.render-ootd.outputs.task-definition }}
          wait-for-service-stability: true
