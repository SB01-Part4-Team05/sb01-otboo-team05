name: Java CI with Gradle

on:
  pull_request:
    branches: [develop]

env:
  SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/ootd
  KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
  WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
  WEATHER_API_URL: ${{ secrets.WEATHER_API_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  ADMIN_NAME: ${{ secrets.ADMIN_NAME }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup PostgreSQL
        uses: Harmon758/postgresql-action@v1.0.0
        with:
          postgresql version: 14
          postgresql db: ootd
          postgresql user: ${{ secrets.SPRING_DATASOURCE_USER }}
          postgresql password: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

      - name: Check PostgreSQL connectivity
        run: |
          sudo apt-get install -y postgresql-client
          pg_isready -h localhost -p 5432


      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: test with Gradle Wrapper
        run: ./gradlew test

