name: notification to discord

on:
  pull_request_target:
    types:
      - closed

jobs:
  notification:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        uses: th0th/notify-discord@v0.4.1
        with:
          webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
          content: "auto merge success!"
