name: Run test

on:
  pull_request:
    branches: [develop]

env:
  SPRING_DATASOURCE_URL: ${{ secrets.RDS_URL }}
  SPRING_DATASOURCE_USERNAME: ${{ secrets.RDS_USER }}
  SPRING_DATASOURCE_PASSWORD: ${{ secrets.RDS_PASS }}
  KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
  WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
  WEATHER_API_URL: ${{ secrets.WEATHER_API_URL }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
  MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
  ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  ADMIN_NAME: ${{ secrets.ADMIN_NAME }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
  AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
  CLOTHES_BUCKET: ${{ secrets.AWS_S3_CLOTHES_BUCKET}}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup PostgreSQL
        uses: Harmon758/postgresql-action@v1.0.0
        with:
          postgresql version: 14
          postgresql db: ootd
          postgresql user: ${{ secrets.SPRING_DATASOURCE_USER }}
          postgresql password: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}

      - name: Check PostgreSQL connectivity
        run: |
          sudo apt-get install -y postgresql-client
          pg_isready -h localhost -p 5432


      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: test with Gradle Wrapper
        run: ./gradlew test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/reports/jacoco/test/jacocoTestReport.xml
